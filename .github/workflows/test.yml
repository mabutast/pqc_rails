name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rspec:
    runs-on: ubuntu-latest
    env:
      LIBOQS_VERSION: "0.15.0"
      LIBOQS_INSTALL_PREFIX: ${{ github.workspace }}/.liboqs
    steps:
      - uses: actions/checkout@v4

      - name: Cache liboqs
        id: cache-liboqs
        uses: actions/cache@v4
        with:
          path: ${{ env.LIBOQS_INSTALL_PREFIX }}
          key: liboqs-${{ runner.os }}-${{ env.LIBOQS_VERSION }}-v2

      - name: Install liboqs build dependencies
        if: steps.cache-liboqs.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build libssl-dev

      - name: Build and install liboqs
        if: steps.cache-liboqs.outputs.cache-hit != 'true'
        run: |
          git clone --branch "${LIBOQS_VERSION}" --depth 1 https://github.com/open-quantum-safe/liboqs.git
          cmake -GNinja -S liboqs -B liboqs/build \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${LIBOQS_INSTALL_PREFIX}"
          cmake --build liboqs/build
          cmake --install liboqs/build

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Run RSpec
        env:
          LIBOQS_PATH: ${{ env.LIBOQS_INSTALL_PREFIX }}/lib/liboqs.so
        run: bundle exec rspec
